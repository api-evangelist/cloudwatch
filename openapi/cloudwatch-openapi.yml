              schema:
                $ref: '#/components/schemas/ErrorResponse'

              examples:
                Describealarmhistory400Example:
                  summary: Default DescribeAlarmHistory 400 response
                  x-microcks-default: true
                  value:
                    Error:
                      Type: example_value
                      Code: example_value
                      Message: example_value
                    RequestId: '500123'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /#DeleteAlarms:
    post:
      operationId: DeleteAlarms
      summary: Aws Cloudwatch Delete Specified Alarms
      description: >-
        Deletes the specified alarms. You can delete up to 100 alarms in one
        operation. In the event of an error, no alarms are deleted. To get
        information about your current alarms, use DescribeAlarms. If a
        specified alarm does not exist, no error is returned.
      tags:
      - Alarms
      parameters:
      - $ref: '#/components/parameters/Action_DeleteAlarms'
      - $ref: '#/components/parameters/Version'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DeleteAlarmsInput'
            examples:
              DeletealarmsRequestExample:
                summary: Default DeleteAlarms request
                x-microcks-default: true
                value:
                  AlarmNames:
                  - example_value
      responses:
        '200':
          description: Successful response
        '400':
          description: Resource not found
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

              examples:
                Deletealarms400Example:
                  summary: Default DeleteAlarms 400 response
                  x-microcks-default: true
                  value:
                    Error:
                      Type: example_value
                      Code: example_value
                      Message: example_value
                    RequestId: '500123'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /#SetAlarmState:
    post:
      operationId: SetAlarmState
      summary: Aws Cloudwatch Temporarily Set the State of an Alarm
      description: >-
        Temporarily sets the state of an alarm for testing purposes. When the
        updated state differs from the previous value, the action configured
        for the appropriate state is invoked. For example, if your alarm is
        configured to send an Amazon SNS message when an alarm is triggered,
        temporarily changing the alarm state to ALARM sends an SNS message.
      tags:
      - Alarms
      parameters:
      - $ref: '#/components/parameters/Action_SetAlarmState'
      - $ref: '#/components/parameters/Version'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SetAlarmStateInput'
            examples:
              SetalarmstateRequestExample:
                summary: Default SetAlarmState request
                x-microcks-default: true
                value:
