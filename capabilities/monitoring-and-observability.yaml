naftiko: "1.0.0-alpha1"

info:
  label: "AWS CloudWatch Monitoring and Observability"
  description: "Monitor AWS resources with metrics, alarms, dashboards, anomaly detection, and metric streams. Used by DevOps engineers and SRE teams."
  tags:
    - AWS
    - CloudWatch
    - Monitoring
    - Observability
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - import: cloudwatch
      location: ./shared/cloudwatch.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: cloudwatch-monitoring-api
      description: "Unified REST API for CloudWatch monitoring and observability."
      resources:
        - path: /v1/metrics
          name: metrics
          description: "CloudWatch metrics operations"
          operations:
            - method: POST
              name: put-metric-data
              description: "Publish metric data points"
              call: "cloudwatch.put-metric-data"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: GET
              name: list-metrics
              description: "List available metrics"
              call: "cloudwatch.list-metrics"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/metrics/data
          name: metric-data
          description: "Retrieve metric data"
          operations:
            - method: POST
              name: get-metric-data
              description: "Retrieve metric data with math expressions"
              call: "cloudwatch.get-metric-data"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/metrics/statistics
          name: metric-statistics
          description: "Get metric statistics"
          operations:
            - method: POST
              name: get-metric-statistics
              description: "Get statistics for a specific metric"
              call: "cloudwatch.get-metric-statistics"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/alarms
          name: alarms
          description: "CloudWatch alarms"
          operations:
            - method: GET
              name: describe-alarms
              description: "List alarms"
              call: "cloudwatch.describe-alarms"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: put-metric-alarm
              description: "Create or update an alarm"
              call: "cloudwatch.put-metric-alarm"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-alarms
              description: "Delete alarms"
              call: "cloudwatch.delete-alarms"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/dashboards
          name: dashboards
          description: "CloudWatch dashboards"
          operations:
            - method: GET
              name: list-dashboards
              description: "List dashboards"
              call: "cloudwatch.list-dashboards"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: put-dashboard
              description: "Create or update a dashboard"
              call: "cloudwatch.put-dashboard"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: cloudwatch-monitoring-mcp
      transport: http
      description: "MCP server for AI-assisted AWS CloudWatch monitoring."
      tools:
        - name: put-metric-data
          description: "Publish metric data points to CloudWatch"
          hints:
            readOnly: false
          call: "cloudwatch.put-metric-data"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-metric-data
          description: "Retrieve metric data using math expressions"
          hints:
            readOnly: true
            idempotent: true
          call: "cloudwatch.get-metric-data"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-metric-statistics
          description: "Get statistics for a specific metric"
          hints:
            readOnly: true
            idempotent: true
          call: "cloudwatch.get-metric-statistics"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-metrics
          description: "List available CloudWatch metrics"
          hints:
            readOnly: true
          call: "cloudwatch.list-metrics"
          outputParameters:
            - type: object
              mapping: "$."
        - name: put-metric-alarm
          description: "Create or update a metric alarm"
          hints:
            readOnly: false
            idempotent: true
          call: "cloudwatch.put-metric-alarm"
          outputParameters:
            - type: object
              mapping: "$."
        - name: put-composite-alarm
          description: "Create or update a composite alarm"
          hints:
            readOnly: false
            idempotent: true
          call: "cloudwatch.put-composite-alarm"
          outputParameters:
            - type: object
              mapping: "$."
        - name: describe-alarms
          description: "List and describe CloudWatch alarms"
          hints:
            readOnly: true
          call: "cloudwatch.describe-alarms"
          outputParameters:
            - type: object
              mapping: "$."
        - name: describe-alarms-for-metric
          description: "Describe alarms for a specific metric"
          hints:
            readOnly: true
          call: "cloudwatch.describe-alarms-for-metric"
          outputParameters:
            - type: object
              mapping: "$."
        - name: describe-alarm-history
          description: "Retrieve alarm state change history"
          hints:
            readOnly: true
          call: "cloudwatch.describe-alarm-history"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-alarms
          description: "Delete one or more alarms"
          hints:
            destructive: true
            idempotent: true
          call: "cloudwatch.delete-alarms"
          outputParameters:
            - type: object
              mapping: "$."
        - name: set-alarm-state
          description: "Temporarily set the state of an alarm"
          hints:
            readOnly: false
          call: "cloudwatch.set-alarm-state"
          outputParameters:
            - type: object
              mapping: "$."
        - name: enable-alarm-actions
          description: "Enable actions for alarms"
          hints:
            readOnly: false
          call: "cloudwatch.enable-alarm-actions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: disable-alarm-actions
          description: "Disable actions for alarms"
          hints:
            readOnly: false
          call: "cloudwatch.disable-alarm-actions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: put-dashboard
          description: "Create or update a CloudWatch dashboard"
          hints:
            readOnly: false
            idempotent: true
          call: "cloudwatch.put-dashboard"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-dashboard
          description: "Get a CloudWatch dashboard"
          hints:
            readOnly: true
          call: "cloudwatch.get-dashboard"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-dashboards
          description: "List CloudWatch dashboards"
          hints:
            readOnly: true
          call: "cloudwatch.list-dashboards"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-dashboards
          description: "Delete CloudWatch dashboards"
          hints:
            destructive: true
            idempotent: true
          call: "cloudwatch.delete-dashboards"
          outputParameters:
            - type: object
              mapping: "$."
        - name: put-anomaly-detector
          description: "Create or update an anomaly detector"
          hints:
            readOnly: false
            idempotent: true
          call: "cloudwatch.put-anomaly-detector"
          outputParameters:
            - type: object
              mapping: "$."
        - name: describe-anomaly-detectors
          description: "List anomaly detectors"
          hints:
            readOnly: true
          call: "cloudwatch.describe-anomaly-detectors"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-anomaly-detector
          description: "Delete an anomaly detector"
          hints:
            destructive: true
            idempotent: true
          call: "cloudwatch.delete-anomaly-detector"
          outputParameters:
            - type: object
              mapping: "$."
        - name: put-metric-stream
          description: "Create or update a metric stream"
          hints:
            readOnly: false
            idempotent: true
          call: "cloudwatch.put-metric-stream"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-metric-streams
          description: "List metric streams"
          hints:
            readOnly: true
          call: "cloudwatch.list-metric-streams"
          outputParameters:
            - type: object
              mapping: "$."
        - name: tag-resource
          description: "Add tags to a CloudWatch resource"
          hints:
            readOnly: false
          call: "cloudwatch.tag-resource"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-tags-for-resource
          description: "List tags for a CloudWatch resource"
          hints:
            readOnly: true
          call: "cloudwatch.list-tags-for-resource"
          outputParameters:
            - type: object
              mapping: "$."
