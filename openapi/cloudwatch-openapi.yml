openapi: 3.1.0
info:
  title: AWS CloudWatch Amazon CloudWatch API
  description: >-
    Amazon CloudWatch monitors your Amazon Web Services (AWS) resources and the
    applications you run on AWS in real time. You can use CloudWatch to collect
    and track metrics, which are variables you can measure for your resources
    and applications. CloudWatch alarms watch metrics and automatically send
    notifications or make changes to the resources you are monitoring when a
    threshold is breached. CloudWatch dashboards provide a unified view of your
    AWS resources, custom applications, and services.
  version: '2010-08-01'
  contact:
    name: Amazon Web Services
    url: https://aws.amazon.com/cloudwatch/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  x-logo:
    url: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png

externalDocs:
  description: Amazon CloudWatch API Reference
  url: https://docs.aws.amazon.com/AmazonCloudWatch/latest/APIReference/

servers:
- url: https://monitoring.{region}.amazonaws.com
  description: CloudWatch regional endpoint
  variables:
    region:
      default: us-east-1
      description: The AWS region
      enum:
      - us-east-1
      - us-east-2
      - us-west-1
      - us-west-2
      - eu-west-1
      - eu-west-2
      - eu-west-3
      - eu-central-1
      - eu-north-1
      - ap-east-1
      - ap-south-1
      - ap-southeast-1
      - ap-southeast-2
      - ap-northeast-1
      - ap-northeast-2
      - ap-northeast-3
      - sa-east-1
      - ca-central-1
      - me-south-1
      - af-south-1

security:
- aws_sigv4: []

tags:
- name: Alarms
  description: Operations for creating, managing, and querying CloudWatch alarms
- name: Anomaly Detection
  description: Operations for CloudWatch anomaly detection models
- name: Composite Alarms
  description: Operations for composite alarms that aggregate multiple alarm states

- name: Dashboards
  description: Operations for creating and managing CloudWatch dashboards
- name: Metric Streams
  description: Operations for managing metric streams
- name: Metrics
  description: Operations for working with CloudWatch metrics and metric data
paths:
  /:
    post:
      operationId: PutMetricData
      summary: Aws Cloudwatch Publish Metric Data Points to Cloudwatch
      description: >-
        Publishes metric data points to Amazon CloudWatch. CloudWatch associates
        the data points with the specified metric. If the specified metric does
        not exist, CloudWatch creates the metric. When CloudWatch creates a
        metric, it can take up to fifteen minutes for the metric to appear in
        calls to ListMetrics. Each PutMetricData request is limited to 1 MB in
        size for HTTP POST requests and is limited to 40 KB for HTTP GET
        requests. The maximum number of metric datum items per PutMetricData
        request is 1,000.
      tags:
      - Metrics
      parameters:
      - $ref: '#/components/parameters/Action_PutMetricData'
      - $ref: '#/components/parameters/Version'
      - $ref: '#/components/parameters/ContentType'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PutMetricDataInput'
            examples:
              PutmetricdataRequestExample:
                summary: Default PutMetricData request
                x-microcks-default: true
                value:
                  Namespace: example_value
                  MetricData:
                  - MetricName: example_value
                    Dimensions: {}
                    Timestamp: '2026-01-15T10:30:00Z'
                    Value: 42.5
                    Values: {}
                    Counts: {}
                    StorageResolution: 10
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Putmetricdata400Example:
                  summary: Default PutMetricData 400 response
                  x-microcks-default: true
                  value:
                    Error:
                      Type: example_value
                      Code: example_value
                      Message: example_value
                    RequestId: '500123'
        '500':
          description: Internal failure
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

              examples:
                Putmetricdata500Example:
                  summary: Default PutMetricData 500 response
                  x-microcks-default: true
                  value:
                    Error:
                      Type: example_value
                      Code: example_value
                      Message: example_value
                    RequestId: '500123'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /#GetMetricData:
    post:
      operationId: GetMetricData
      summary: Aws Cloudwatch Retrieve Metric Data From Cloudwatch
      description: >-
        Retrieves CloudWatch metric values. You can use GetMetricData to
        retrieve as many as 500 different metrics in a single request, with a
        total of as many as 100,800 data points per request. You can also
        optionally perform metric math expressions on the values of the
        returned statistics. CloudWatch returns aggregated data points based on
        the statistical values requested.
      tags:
      - Metrics
      parameters:
      - $ref: '#/components/parameters/Action_GetMetricData'
      - $ref: '#/components/parameters/Version'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GetMetricDataInput'
            examples:
              GetmetricdataRequestExample:
                summary: Default GetMetricData request
                x-microcks-default: true
                value:
                  MetricDataQueries:
                  - Id: abc123
                    Expression: example_value
                    Label: Example Title
                    ReturnData: true
                    Period: 10
                    AccountId: '500123'
                  StartTime: '2026-01-15T10:30:00Z'
                  EndTime: '2026-01-15T10:30:00Z'
                  NextToken: example_value
                  ScanBy: TimestampDescending
                  MaxDatapoints: 10
                  LabelOptions:
                    Timezone: example_value
      responses:
        '200':
          description: Successful response
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/GetMetricDataOutput'
              examples:
                Getmetricdata200Example:
                  summary: Default GetMetricData 200 response
                  x-microcks-default: true
                  value:
                    MetricDataResults:
                    - Id: abc123
                      Label: Example Title
                      Timestamps: {}
                      Values: {}
                      StatusCode: Complete
                      Messages: {}
                    NextToken: example_value
                    Messages:
                    - Code: example_value
                      Value: example_value
        '400':
          description: Invalid parameter value or combination
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

              examples:
                Getmetricdata400Example:
                  summary: Default GetMetricData 400 response
                  x-microcks-default: true
                  value:
                    Error:
                      Type: example_value
                      Code: example_value
                      Message: example_value
                    RequestId: '500123'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /#GetMetricStatistics:
    post:
      operationId: GetMetricStatistics
      summary: Aws Cloudwatch Retrieve Statistics for a Specified Metric
      description: >-
        Gets statistics for the specified metric. The maximum number of data
        points returned from a single call is 1,440. If you request more than
        1,440 data points, CloudWatch returns an error. CloudWatch retains
        metric data as follows - data points with a period of less than 60
        seconds are available for 3 hours, data points with a period of 60
        seconds are available for 15 days, data points with a period of 300
        seconds are available for 63 days, and data points with a period of
        3600 seconds are available for 455 days.
      tags:
      - Metrics
      parameters:
      - $ref: '#/components/parameters/Action_GetMetricStatistics'
      - $ref: '#/components/parameters/Version'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GetMetricStatisticsInput'
            examples:
              GetmetricstatisticsRequestExample:
                summary: Default GetMetricStatistics request
                x-microcks-default: true
                value:
                  Namespace: example_value
                  MetricName: example_value
                  Dimensions:
                  - Name: Example Title
                    Value: example_value
                  StartTime: '2026-01-15T10:30:00Z'
                  EndTime: '2026-01-15T10:30:00Z'
                  Period: 10
                  Statistics:
                  - SampleCount
                  ExtendedStatistics:
                  - example_value
                  Unit: Seconds
      responses:
        '200':
          description: Successful response
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/GetMetricStatisticsOutput'
              examples:
                Getmetricstatistics200Example:
                  summary: Default GetMetricStatistics 200 response
                  x-microcks-default: true
                  value:
                    Label: Example Title
                    Datapoints:
                    - Timestamp: '2026-01-15T10:30:00Z'
                      SampleCount: 42.5
                      Average: 42.5
                      Sum: 42.5
                      Minimum: 42.5
                      Maximum: 42.5
                      ExtendedStatistics: example_value
        '400':
          description: Bad request
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

              examples:
                Getmetricstatistics400Example:
                  summary: Default GetMetricStatistics 400 response
                  x-microcks-default: true
                  value:
                    Error:
                      Type: example_value
                      Code: example_value
                      Message: example_value
                    RequestId: '500123'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /#ListMetrics:
    post:
      operationId: ListMetrics
      summary: Aws Cloudwatch List the Specified Metrics
      description: >-
        List the specified metrics. You can use the returned metrics with
        GetMetricData or GetMetricStatistics to get statistical data. Up to 500
        results are returned for any one call. To retrieve additional results,
        use the returned token with subsequent calls. CloudWatch retains metric
        data for 15 months.
      tags:
      - Metrics
      parameters:
      - $ref: '#/components/parameters/Action_ListMetrics'
      - $ref: '#/components/parameters/Version'
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ListMetricsInput'
            examples:
              ListmetricsRequestExample:
                summary: Default ListMetrics request
                x-microcks-default: true
                value:
                  Namespace: example_value
                  MetricName: example_value
                  Dimensions:
                  - Name: Example Title
                    Value: example_value
                  NextToken: example_value
                  RecentlyActive: PT3H
                  IncludeLinkedAccounts: true
                  OwningAccount: example_value
      responses:
        '200':
          description: Successful response
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ListMetricsOutput'
              examples:
                Listmetrics200Example:
                  summary: Default ListMetrics 200 response
                  x-microcks-default: true
                  value:
                    Metrics:
                    - Namespace: example_value
                      MetricName: example_value
                      Dimensions: {}
                    NextToken: example_value
                    OwningAccounts:
                    - example_value
        '400':
          description: Bad request
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

              examples:
                Listmetrics400Example:
                  summary: Default ListMetrics 400 response
                  x-microcks-default: true
                  value:
                    Error:
                      Type: example_value
                      Code: example_value
                      Message: example_value
                    RequestId: '500123'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /#PutMetricAlarm:
    post:
      operationId: PutMetricAlarm
      summary: Aws Cloudwatch Create or Update a Cloudwatch Alarm
      description: >-
        Creates or updates an alarm and associates it with the specified metric,
        metric math expression, anomaly detection model, or Metrics Insights
        query. When the alarm state changes, the alarm invokes the specified
        actions. An alarm can watch only one metric at a time, but it can take
        actions based on other alarms. If you are using a composite alarm, the
        alarm watches the states of other alarms.
      tags:
      - Alarms
      parameters:
      - $ref: '#/components/parameters/Action_PutMetricAlarm'
      - $ref: '#/components/parameters/Version'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PutMetricAlarmInput'
            examples:
              PutmetricalarmRequestExample:
                summary: Default PutMetricAlarm request
                x-microcks-default: true
                value:
                  AlarmName: example_value
                  AlarmDescription: example_value
                  ActionsEnabled: true
                  OKActions:
                  - example_value
                  AlarmActions:
                  - example_value
                  InsufficientDataActions:
                  - example_value
                  MetricName: example_value
                  Namespace: example_value
                  Statistic: SampleCount
                  ExtendedStatistic: example_value
                  Dimensions:
                  - Name: Example Title
                    Value: example_value
                  Period: 10
                  Unit: Seconds
                  EvaluationPeriods: 10
                  DatapointsToAlarm: 10
                  Threshold: 42.5
                  ComparisonOperator: GreaterThanOrEqualToThreshold
                  TreatMissingData: example_value
                  EvaluateLowSampleCountPercentile: example_value
                  Metrics:
                  - Id: abc123
                    Expression: example_value
                    Label: Example Title
                    ReturnData: true
                    Period: 10
                    AccountId: '500123'
                  Tags:
                  - Key: example_value
                    Value: example_value
                  ThresholdMetricId: '500123'
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request - limit exceeded
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

              examples:
                Putmetricalarm400Example:
                  summary: Default PutMetricAlarm 400 response
                  x-microcks-default: true
                  value:
                    Error:
                      Type: example_value
                      Code: example_value
                      Message: example_value
                    RequestId: '500123'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /#PutCompositeAlarm:
    post:
      operationId: PutCompositeAlarm
      summary: Aws Cloudwatch Create or Update a Composite Alarm
      description: >-
        Creates or updates a composite alarm. When you create a composite alarm,
        you specify a rule expression for the alarm that takes into account the
        alarm states of other alarms that you have created. The composite alarm
        goes into ALARM state only if all conditions of the rule are met.
      tags:
      - Composite Alarms
      parameters:
      - $ref: '#/components/parameters/Action_PutCompositeAlarm'
      - $ref: '#/components/parameters/Version'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PutCompositeAlarmInput'
            examples:
              PutcompositealarmRequestExample:
                summary: Default PutCompositeAlarm request
                x-microcks-default: true
                value:
                  AlarmName: example_value
                  AlarmDescription: example_value
                  ActionsEnabled: true
                  AlarmActions:
                  - example_value
                  AlarmRule: example_value
                  InsufficientDataActions:
                  - example_value
                  OKActions:
                  - example_value
                  Tags:
                  - Key: example_value
                    Value: example_value
                  ActionsSuppressor: example_value
                  ActionsSuppressorWaitPeriod: 10
                  ActionsSuppressorExtensionPeriod: 10
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request - limit exceeded
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

              examples:
                Putcompositealarm400Example:
                  summary: Default PutCompositeAlarm 400 response
                  x-microcks-default: true
                  value:
                    Error:
                      Type: example_value
                      Code: example_value
                      Message: example_value
                    RequestId: '500123'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /#DescribeAlarms:
