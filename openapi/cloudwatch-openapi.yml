      required: true
      schema:
        type: string
        enum:
          - GetMetricStatistics

    Action_ListMetrics:
      name: Action
      in: query
      required: true
      schema:
        type: string
        enum:
          - ListMetrics

    Action_PutMetricAlarm:
      name: Action
      in: query
      required: true
      schema:
        type: string
        enum:
          - PutMetricAlarm

    Action_PutCompositeAlarm:
      name: Action
      in: query
      required: true
