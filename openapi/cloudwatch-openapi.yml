  schemas:
    Dimension:
      type: object
      description: A dimension is a name/value pair that is part of the identity of a metric.
      required:
      - Name
      - Value
      properties:
        Name:
          type: string
          minLength: 1
          maxLength: 255
          description: The name of the dimension. Dimension names must contain only ASCII characters, must include at least one non-whitespace character, and cannot start with a colon (:).
          example: Example Title
        Value:
          type: string
          minLength: 1
          maxLength: 1024
          description: The value of the dimension. Dimension values must contain only ASCII characters and must include at least one non-whitespace character.

          example: example_value
    DimensionFilter:
      type: object
      description: Represents filters for a dimension.
      required:
      - Name
      properties:
        Name:
          type: string
          minLength: 1
          maxLength: 255
          description: The dimension name to be matched.
          example: Example Title
        Value:
          type: string
          minLength: 1
          maxLength: 1024
          description: The value of the dimension to be matched.

          example: example_value
    Metric:
      type: object
      description: Represents a specific metric.
      properties:
        Namespace:
          type: string
          minLength: 1
          maxLength: 255
          pattern: '[^:].*'
          description: The namespace of the metric.
          example: example_value
        MetricName:
          type: string
          minLength: 1
          maxLength: 255
          description: The name of the metric.
          example: example_value
        Dimensions:
          type: array
          items:
            $ref: '#/components/schemas/Dimension'
          maxItems: 30
          description: The dimensions for the metric.

          example: []
    MetricDatum:
      type: object
      description: >-
        Encapsulates the information sent to either create a metric or add
        new values to be aggregated into an existing metric.
      required:
      - MetricName
      properties:
        MetricName:
          type: string
          minLength: 1
          maxLength: 255
          description: The name of the metric.
          example: example_value
        Dimensions:
          type: array
          items:
            $ref: '#/components/schemas/Dimension'
          maxItems: 30
          description: The dimensions associated with the metric.
          example: []
        Timestamp:
          type: string
          format: date-time
          description: The time the metric data was received, expressed as the number of milliseconds since Jan 1, 1970 00:00:00 UTC.
          example: '2026-01-15T10:30:00Z'
        Value:
          type: number
          format: double
          description: The value for the metric. Although the parameter accepts numbers of type Double, CloudWatch rejects values that are either too small or too large.
          example: 42.5
        StatisticValues:
          $ref: '#/components/schemas/StatisticSet'
        Values:
          type: array
          items:
            type: number
            format: double
          description: Array of numbers representing the values for the metric during the period.
          example: []
        Counts:
          type: array
          items:
            type: number
            format: double
          description: Array of numbers that is used along with the Values array.
          example: []
        Unit:
          $ref: '#/components/schemas/StandardUnit'
        StorageResolution:
          type: integer
          minimum: 1
          description: Valid values are 1 and 60. Setting this to 1 specifies this metric as a high-resolution metric.

          example: 10
    StatisticSet:
      type: object
      description: Represents a set of statistics that describes a specific metric.
      required:
      - SampleCount
      - Sum
      - Minimum
      - Maximum
      properties:
        SampleCount:
          type: number
          format: double
          description: The number of samples used for the statistic set.
          example: 42.5
        Sum:
          type: number
          format: double
          description: The sum of values for the sample set.
          example: 42.5
        Minimum:
          type: number
          format: double
          description: The minimum value of the sample set.
          example: 42.5
        Maximum:
          type: number
          format: double
          description: The maximum value of the sample set.

          example: 42.5
    StandardUnit:
      type: string
      description: The unit of the metric.
      enum:
      - Seconds
      - Microseconds
      - Milliseconds
      - Bytes
      - Kilobytes
      - Megabytes
      - Gigabytes
      - Terabytes
      - Bits
      - Kilobits
      - Megabits
      - Gigabits
      - Terabits
      - Percent
      - Count
      - Bytes/Second
      - Kilobytes/Second
      - Megabytes/Second
      - Gigabytes/Second
      - Terabytes/Second
      - Bits/Second
      - Kilobits/Second
      - Megabits/Second
      - Gigabits/Second
      - Terabits/Second
      - Count/Second
      - None

    Datapoint:
      type: object
      description: Encapsulates the statistical data that CloudWatch computes from metric data.
      properties:
        Timestamp:
          type: string
          format: date-time
          description: The time stamp used for the data point.
          example: '2026-01-15T10:30:00Z'
        SampleCount:
          type: number
          format: double
          description: The number of metric values that contributed to the aggregate value of this data point.
          example: 42.5
        Average:
          type: number
          format: double
          description: The average of the metric values that correspond to the data point.
          example: 42.5
        Sum:
          type: number
          format: double
          description: The sum of the metric values for the data point.
          example: 42.5
        Minimum:
          type: number
          format: double
          description: The minimum metric value for the data point.
          example: 42.5
        Maximum:
          type: number
          format: double
          description: The maximum metric value for the data point.
          example: 42.5
        Unit:
          $ref: '#/components/schemas/StandardUnit'
        ExtendedStatistics:
          type: object
          additionalProperties:
            type: number
            format: double
          description: The percentile statistic for the data point.

          example: example_value
    MetricDataQuery:
      type: object
      description: >-
        This structure is used in both GetMetricData and PutMetricAlarm. The
        supported use of this structure is different for those two operations.
      required:
      - Id
      properties:
        Id:
          type: string
          minLength: 1
          maxLength: 255
          pattern: '[a-z][a-zA-Z0-9_]*'
          description: A short name used to tie this object to the results in the response.
          example: abc123
        MetricStat:
          $ref: '#/components/schemas/MetricStat'
        Expression:
          type: string
          minLength: 1
          maxLength: 2048
          description: This field can contain a Metrics Insights query, or a metric math expression.
          example: example_value
        Label:
          type: string
          description: A human-readable label for this metric or expression.
          example: Example Title
        ReturnData:
          type: boolean
          description: When used in GetMetricData, this option indicates whether to return the timestamps and raw data values of this metric.
          example: true
        Period:
          type: integer
          minimum: 1
          description: The granularity, in seconds, of the returned data points.
          example: 10
        AccountId:
          type: string
          minLength: 1
          maxLength: 255
          description: The ID of the account where the metrics are located.

          example: '500123'
    MetricStat:
      type: object
      description: >-
        This structure defines the metric to be returned, along with the
        statistics, period, and units.
      required:
      - Metric
      - Period
      - Stat
      properties:
        Metric:
          $ref: '#/components/schemas/Metric'
        Period:
          type: integer
          minimum: 1
          description: The granularity, in seconds, of the returned data points.
          example: 10
        Stat:
          type: string
          description: The statistic to return. It can include any CloudWatch statistic or extended statistic.
          example: example_value
        Unit:
          $ref: '#/components/schemas/StandardUnit'

    MetricDataResult:
      type: object
      description: A GetMetricData call returns an array of MetricDataResult structures.
      properties:
        Id:
          type: string
          description: The short name you specified to represent this metric.
          example: abc123
        Label:
          type: string
          description: The human-readable label associated with the data.
          example: Example Title
        Timestamps:
          type: array
          items:
            type: string
            format: date-time
          description: The timestamps for the data points, formatted in Unix epoch time.
          example: []
        Values:
          type: array
          items:
            type: number
            format: double
          description: The data points for the metric corresponding to Timestamps.
          example: []
        StatusCode:
          type: string
          enum:
          - Complete
          - InternalError
          - Forbidden
          - PartialData
          description: The status of the returned data.
          example: Complete
        Messages:
          type: array
          items:
            $ref: '#/components/schemas/MessageData'
          description: A list of messages with additional information about the data returned.

          example: []
    MessageData:
      type: object
      description: A message returned by the GetMetricData API.
      properties:
        Code:
          type: string
          description: The error code or status code associated with the message.
          example: example_value
        Value:
          type: string
          description: The message text.

          example: example_value
    MetricAlarm:
      type: object
      description: The details about a metric alarm.
      properties:
        AlarmName:
          type: string
          minLength: 1
          maxLength: 255
          description: The name of the alarm.
          example: example_value
        AlarmArn:
          type: string
          minLength: 1
          maxLength: 1600
          description: The Amazon Resource Name (ARN) of the alarm.
          example: example_value
        AlarmDescription:
          type: string
          maxLength: 1024
          description: The description of the alarm.
          example: example_value
        AlarmConfigurationUpdatedTimestamp:
          type: string
          format: date-time
          description: The time stamp of the last update to the alarm configuration.
          example: '2026-01-15T10:30:00Z'
        ActionsEnabled:
          type: boolean
          description: Indicates whether actions should be executed during any changes to the alarm state.
          example: true
        OKActions:
          type: array
          items:
            type: string
          maxItems: 5
          description: The actions to execute when this alarm transitions to the OK state.
          example: []
        AlarmActions:
          type: array
          items:
            type: string
          maxItems: 5
          description: The actions to execute when this alarm transitions to the ALARM state.
          example: []
        InsufficientDataActions:
          type: array
          items:
            type: string
          maxItems: 5
          description: The actions to execute when this alarm transitions to the INSUFFICIENT_DATA state.
          example: []
        StateValue:
          $ref: '#/components/schemas/StateValue'
        StateReason:
          type: string
          maxLength: 1023
          description: An explanation for the alarm state, in text format.
          example: example_value
        StateReasonData:
          type: string
          maxLength: 4000
          description: An explanation for the alarm state, in JSON format.
          example: example_value
        StateUpdatedTimestamp:
          type: string
          format: date-time
          description: The time stamp of the last update to the value of either the StateValue or StateReasonData.
          example: '2026-01-15T10:30:00Z'
        MetricName:
          type: string
          minLength: 1
          maxLength: 255
          description: The name of the metric associated with the alarm.
          example: example_value
        Namespace:
          type: string
          minLength: 1
          maxLength: 255
          description: The namespace of the metric associated with the alarm.
          example: example_value
        Statistic:
          $ref: '#/components/schemas/Statistic'
        ExtendedStatistic:
          type: string
          description: The percentile statistic for the metric associated with the alarm.
          example: example_value
        Dimensions:
          type: array
          items:
            $ref: '#/components/schemas/Dimension'
          maxItems: 30
          description: The dimensions for the metric associated with the alarm.
          example: []
        Period:
          type: integer
          minimum: 1
          description: The period, in seconds, over which the statistic is applied.
          example: 10
        Unit:
          $ref: '#/components/schemas/StandardUnit'
        EvaluationPeriods:
          type: integer
          minimum: 1
          description: The number of periods over which data is compared to the specified threshold.
          example: 10
        DatapointsToAlarm:
          type: integer
          minimum: 1
          description: The number of data points that must be breaching to trigger the alarm.
          example: 10
        Threshold:
          type: number
          format: double
          description: The value to compare with the specified statistic.
          example: 42.5
        ComparisonOperator:
          $ref: '#/components/schemas/ComparisonOperator'
        TreatMissingData:
          type: string
          enum:
          - breaching
          - notBreaching
          - ignore
          - missing
          description: Sets how this alarm is to handle missing data points.
          example: breaching
        EvaluateLowSampleCountPercentile:
          type: string
          description: Used only for alarms based on percentiles.
          example: example_value
        Metrics:
          type: array
          items:
            $ref: '#/components/schemas/MetricDataQuery'
          description: An array of MetricDataQuery structures for metric math expressions.
          example: []
        ThresholdMetricId:
          type: string
          description: If the value of this field is set to an alarm metric ID, the alarm is based on an anomaly detection model.
          example: '500123'
        StateTransitionedTimestamp:
          type: string
          format: date-time
          description: The date and time that the alarm's StateValue most recently changed.

          example: '2026-01-15T10:30:00Z'
    CompositeAlarm:
      type: object
      description: The details about a composite alarm.
      properties:
        ActionsEnabled:
          type: boolean
          description: Indicates whether actions should be executed during changes to the alarm state.
          example: true
        AlarmActions:
          type: array
          items:
            type: string
          maxItems: 5
          description: The actions to execute when this alarm transitions to the ALARM state.
          example: []
        AlarmArn:
          type: string
          description: The Amazon Resource Name (ARN) of the alarm.
          example: example_value
        AlarmConfigurationUpdatedTimestamp:
          type: string
          format: date-time
          description: The time stamp of the last update to the alarm configuration.
          example: '2026-01-15T10:30:00Z'
        AlarmDescription:
          type: string
          description: The description of the alarm.
          example: example_value
        AlarmName:
          type: string
          description: The name of the alarm.
          example: example_value
        AlarmRule:
          type: string
          minLength: 1
          maxLength: 10240
          description: The rule that this alarm uses to evaluate its alarm state.
          example: example_value
        InsufficientDataActions:
          type: array
          items:
            type: string
          maxItems: 5
          description: The actions to execute when this alarm transitions to the INSUFFICIENT_DATA state.
          example: []
        OKActions:
          type: array
          items:
            type: string
          maxItems: 5
          description: The actions to execute when this alarm transitions to the OK state.
          example: []
        StateReason:
          type: string
          description: An explanation for the alarm state, in text format.
          example: example_value
        StateReasonData:
          type: string
          description: An explanation for the alarm state, in JSON format.
          example: example_value
        StateUpdatedTimestamp:
          type: string
          format: date-time
          description: The timestamp of the last change to the alarm's StateValue.
          example: '2026-01-15T10:30:00Z'
        StateValue:
          $ref: '#/components/schemas/StateValue'
        StateTransitionedTimestamp:
          type: string
          format: date-time
          description: The timestamp of the last state transition.
          example: '2026-01-15T10:30:00Z'
        ActionsSuppressedBy:
          type: string
          enum:
          - WaitPeriod
          - ExtensionPeriod
          - Alarm
          description: When the value is ALARM, it means that the actions are suppressed.
          example: WaitPeriod
        ActionsSuppressedReason:
          type: string
          description: Describes why the actions are suppressed.
          example: example_value
        ActionsSuppressor:
          type: string
          description: The ARN of the alarm used as the actions suppressor.
          example: example_value
        ActionsSuppressorWaitPeriod:
          type: integer
          description: The maximum time in seconds that the composite alarm waits after suppressor alarm goes into ALARM state.
          example: 10
        ActionsSuppressorExtensionPeriod:
          type: integer
          description: The maximum time in seconds that the composite alarm waits after suppressor alarm goes out of ALARM state.

          example: 10
    StateValue:
      type: string
      description: The state value for the alarm.
      enum:
      - OK
      - ALARM
      - INSUFFICIENT_DATA

    Statistic:
      type: string
      description: The statistic for the metric.
      enum:
      - SampleCount
      - Average
      - Sum
      - Minimum
      - Maximum

    ComparisonOperator:
      type: string
      description: The arithmetic operation to use when comparing the specified statistic and threshold.
      enum:
      - GreaterThanOrEqualToThreshold
      - GreaterThanThreshold
      - LessThanThreshold
      - LessThanOrEqualToThreshold
      - LessThanLowerOrGreaterThanUpperThreshold
      - LessThanLowerThreshold
      - GreaterThanUpperThreshold

    AlarmHistoryItem:
      type: object
      description: Represents the history of a specific alarm.
      properties:
        AlarmName:
          type: string
          description: The descriptive name for the alarm.
          example: example_value
        AlarmType:
          type: string
          enum:
          - CompositeAlarm
          - MetricAlarm
          description: The type of alarm, either metric alarm or composite alarm.
          example: CompositeAlarm
        Timestamp:
          type: string
          format: date-time
          description: The time stamp for the alarm history item.
          example: '2026-01-15T10:30:00Z'
        HistoryItemType:
          type: string
          enum:
          - ConfigurationUpdate
          - StateUpdate
          - Action
          description: The type of alarm history item.
          example: ConfigurationUpdate
        HistorySummary:
          type: string
          description: A summary of the alarm history, in text format.
          example: example_value
        HistoryData:
          type: string
          description: Data about the alarm, in JSON format.

          example: example_value
    DashboardEntry:
      type: object
      description: Represents a specific dashboard.
      properties:
        DashboardName:
          type: string
          description: The name of the dashboard.
          example: example_value
        DashboardArn:
          type: string
          description: The Amazon Resource Name (ARN) of the dashboard.
          example: example_value
        LastModified:
          type: string
          format: date-time
          description: The time stamp of when the dashboard was last modified.
          example: '2026-01-15T10:30:00Z'
        Size:
          type: integer
          description: The size of the dashboard, in bytes.

          example: 10
    DashboardBody:
      type: object
      description: The JSON body structure for a CloudWatch dashboard.
      properties:
        widgets:
          type: array
          items:
            $ref: '#/components/schemas/DashboardWidget'
          description: An array of dashboard widget objects.

          example: []
    DashboardWidget:
      type: object
      description: A widget in a CloudWatch dashboard.
      required:
      - type
      - properties
      properties:
        type:
          type: string
          enum:
          - metric
          - text
          - log
          - alarm
          - explorer
          description: The type of the widget.
          example: metric
        x:
          type: integer
          minimum: 0
          description: The horizontal position of the widget on the dashboard grid.
          example: 10
        'y':
          type: integer
          minimum: 0
          description: The vertical position of the widget on the dashboard grid.
          example: 10
        width:
          type: integer
          minimum: 1
          maximum: 24
          description: The width of the widget in grid units.
          example: 10
        height:
          type: integer
          minimum: 1
          maximum: 1000
          description: The height of the widget in grid units.
          example: 10
        properties:
          type: object
          description: The properties for the widget, which vary depending on the widget type.

          example: example_value
    DashboardValidationMessage:
      type: object
      description: An error or warning for the PutDashboard operation.
      properties:
        DataPath:
          type: string
          description: The data path related to the message.
          example: example_value
        Message:
          type: string
          description: A message describing the error or warning.

          example: example_value
    AnomalyDetector:
      type: object
      description: An anomaly detection model associated with a particular CloudWatch metric.
      properties:
        Namespace:
          type: string
          description: The namespace of the metric associated with the anomaly detection model.
          example: example_value
        MetricName:
          type: string
          description: The name of the metric associated with the anomaly detection model.
          example: example_value
        Dimensions:
          type: array
          items:
            $ref: '#/components/schemas/Dimension'
          description: The metric dimensions associated with the anomaly detection model.
          example: []
        Stat:
          type: string
          description: The statistic associated with the anomaly detection model.
          example: example_value
        Configuration:
          $ref: '#/components/schemas/AnomalyDetectorConfiguration'
        StateValue:
          type: string
          enum:
          - PENDING_TRAINING
          - TRAINED_INSUFFICIENT_DATA
          - TRAINED
          description: The current status of the anomaly detector model.
          example: PENDING_TRAINING
        MetricCharacteristics:
          $ref: '#/components/schemas/MetricCharacteristics'
        SingleMetricAnomalyDetector:
          $ref: '#/components/schemas/SingleMetricAnomalyDetector'
        MetricMathAnomalyDetector:
          $ref: '#/components/schemas/MetricMathAnomalyDetector'

    AnomalyDetectorConfiguration:
      type: object
      description: The configuration specifies details about how the anomaly detection model is to be trained.
      properties:
        ExcludedTimeRanges:
          type: array
          items:
            $ref: '#/components/schemas/Range'
          description: An array of time ranges to exclude from use when the anomaly detection model is trained.
          example: []
        MetricTimezone:
          type: string
          maxLength: 50
          description: The time zone to use for the metric.

          example: example_value
    Range:
      type: object
      description: Specifies one range of days or times to exclude from use for training an anomaly detection model.
      required:
      - StartTime
      - EndTime
      properties:
        StartTime:
          type: string
          format: date-time
          description: The start time of the range to exclude.
          example: '2026-01-15T10:30:00Z'
        EndTime:
          type: string
          format: date-time
          description: The end time of the range to exclude.

          example: '2026-01-15T10:30:00Z'
    MetricCharacteristics:
      type: object
      description: This object includes parameters that you can use to provide information to CloudWatch to help it build more accurate anomaly detection models.
      properties:
        PeriodicSpikes:
          type: boolean
          description: Set this parameter to true if values for this metric consistently include spikes that should not be considered to be anomalies.

          example: true
    SingleMetricAnomalyDetector:
      type: object
      description: Designates the CloudWatch metric and statistic that provides the time series the anomaly detector uses as input.
      properties:
        AccountId:
          type: string
          description: If the CloudWatch metric that provides the time series is in another account, use this to specify that account ID.
          example: '500123'
        Namespace:
          type: string
          description: The namespace of the metric to create the anomaly detection model for.
          example: example_value
        MetricName:
          type: string
          description: The name of the metric to create the anomaly detection model for.
          example: example_value
        Dimensions:
          type: array
          items:
            $ref: '#/components/schemas/Dimension'
          description: The metric dimensions to create the anomaly detection model for.
          example: []
        Stat:
          type: string
          description: The statistic to use for the metric and anomaly detection model.

          example: example_value
    MetricMathAnomalyDetector:
      type: object
      description: Indicates the CloudWatch math expression that provides the time series the anomaly detector uses as input.
      properties:
        MetricDataQueries:
          type: array
          items:
            $ref: '#/components/schemas/MetricDataQuery'
          description: An array of metric data query structures that enables you to create an anomaly detector based on the result of a metric math expression.

          example: []
    MetricStreamEntry:
      type: object
      description: Contains information about a metric stream.
      properties:
        Arn:
          type: string
          description: The ARN of the metric stream.
          example: example_value
        CreationDate:
          type: string
          format: date-time
          description: The date when the metric stream was created.
          example: '2026-01-15T10:30:00Z'
        LastUpdateDate:
          type: string
          format: date-time
          description: The date when the metric stream was last updated.
          example: '2026-01-15T10:30:00Z'
        Name:
          type: string
          description: The name of the metric stream.
          example: Example Title
        FirehoseArn:
          type: string
          description: The ARN of the Kinesis Data Firehose delivery stream used by this metric stream.
          example: example_value
        State:
          type: string
          description: The current state of the metric stream.
          example: example_value
        OutputFormat:
          type: string
          enum:
          - json
          - opentelemetry0.7
          - opentelemetry1.0
