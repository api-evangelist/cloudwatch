openapi: 3.1.0
info:
  title: Amazon CloudWatch API
  description: >-
    Amazon CloudWatch monitors your Amazon Web Services (AWS) resources and the
    applications you run on AWS in real time. You can use CloudWatch to collect
    and track metrics, which are variables you can measure for your resources
    and applications. CloudWatch alarms watch metrics and automatically send
    notifications or make changes to the resources you are monitoring when a
    threshold is breached. CloudWatch dashboards provide a unified view of your
    AWS resources, custom applications, and services.
  version: '2010-08-01'
  contact:
    name: Amazon Web Services
    url: https://aws.amazon.com/cloudwatch/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  x-logo:
    url: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png

externalDocs:
  description: Amazon CloudWatch API Reference
  url: https://docs.aws.amazon.com/AmazonCloudWatch/latest/APIReference/

servers:
  - url: https://monitoring.{region}.amazonaws.com
    description: CloudWatch regional endpoint
    variables:
      region:
        default: us-east-1
        description: The AWS region
        enum:
          - us-east-1
          - us-east-2
          - us-west-1
          - us-west-2
          - eu-west-1
          - eu-west-2
          - eu-west-3
          - eu-central-1
          - eu-north-1
          - ap-east-1
          - ap-south-1
          - ap-southeast-1
          - ap-southeast-2
          - ap-northeast-1
          - ap-northeast-2
          - ap-northeast-3
          - sa-east-1
          - ca-central-1
          - me-south-1
          - af-south-1

security:
  - aws_sigv4: []

tags:
  - name: Metrics
    description: Operations for working with CloudWatch metrics and metric data
  - name: Alarms
    description: Operations for creating, managing, and querying CloudWatch alarms
  - name: Dashboards
    description: Operations for creating and managing CloudWatch dashboards
  - name: Anomaly Detection
    description: Operations for CloudWatch anomaly detection models
  - name: Metric Streams
    description: Operations for managing metric streams
  - name: Composite Alarms
    description: Operations for composite alarms that aggregate multiple alarm states

paths:
  /:
    post:
      operationId: PutMetricData
      summary: Publish metric data points to CloudWatch
      description: >-
        Publishes metric data points to Amazon CloudWatch. CloudWatch associates
        the data points with the specified metric. If the specified metric does
        not exist, CloudWatch creates the metric. When CloudWatch creates a
        metric, it can take up to fifteen minutes for the metric to appear in
        calls to ListMetrics. Each PutMetricData request is limited to 1 MB in
        size for HTTP POST requests and is limited to 40 KB for HTTP GET
        requests. The maximum number of metric datum items per PutMetricData
        request is 1,000.
      tags:
        - Metrics
      parameters:
        - $ref: '#/components/parameters/Action_PutMetricData'
        - $ref: '#/components/parameters/Version'
        - $ref: '#/components/parameters/ContentType'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PutMetricDataInput'
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal failure
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /#GetMetricData:
    post:
      operationId: GetMetricData
      summary: Retrieve metric data from CloudWatch
      description: >-
        Retrieves CloudWatch metric values. You can use GetMetricData to
        retrieve as many as 500 different metrics in a single request, with a
        total of as many as 100,800 data points per request. You can also
        optionally perform metric math expressions on the values of the
        returned statistics. CloudWatch returns aggregated data points based on
        the statistical values requested.
      tags:
        - Metrics
      parameters:
        - $ref: '#/components/parameters/Action_GetMetricData'
        - $ref: '#/components/parameters/Version'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GetMetricDataInput'
      responses:
        '200':
          description: Successful response
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/GetMetricDataOutput'
        '400':
          description: Invalid parameter value or combination
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /#GetMetricStatistics:
    post:
      operationId: GetMetricStatistics
      summary: Retrieve statistics for a specified metric
      description: >-
        Gets statistics for the specified metric. The maximum number of data
        points returned from a single call is 1,440. If you request more than
        1,440 data points, CloudWatch returns an error. CloudWatch retains
        metric data as follows - data points with a period of less than 60
        seconds are available for 3 hours, data points with a period of 60
        seconds are available for 15 days, data points with a period of 300
        seconds are available for 63 days, and data points with a period of
        3600 seconds are available for 455 days.
      tags:
        - Metrics
      parameters:
        - $ref: '#/components/parameters/Action_GetMetricStatistics'
        - $ref: '#/components/parameters/Version'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GetMetricStatisticsInput'
      responses:
        '200':
          description: Successful response
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/GetMetricStatisticsOutput'
        '400':
          description: Bad request
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /#ListMetrics:
    post:
      operationId: ListMetrics
      summary: List the specified metrics
      description: >-
        List the specified metrics. You can use the returned metrics with
        GetMetricData or GetMetricStatistics to get statistical data. Up to 500
        results are returned for any one call. To retrieve additional results,
        use the returned token with subsequent calls. CloudWatch retains metric
        data for 15 months.
      tags:
        - Metrics
      parameters:
        - $ref: '#/components/parameters/Action_ListMetrics'
        - $ref: '#/components/parameters/Version'
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ListMetricsInput'
      responses:
        '200':
          description: Successful response
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ListMetricsOutput'
        '400':
          description: Bad request
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /#PutMetricAlarm:
    post:
      operationId: PutMetricAlarm
      summary: Create or update a CloudWatch alarm
      description: >-
        Creates or updates an alarm and associates it with the specified metric,
        metric math expression, anomaly detection model, or Metrics Insights
        query. When the alarm state changes, the alarm invokes the specified
        actions. An alarm can watch only one metric at a time, but it can take
        actions based on other alarms. If you are using a composite alarm, the
        alarm watches the states of other alarms.
      tags:
        - Alarms
      parameters:
        - $ref: '#/components/parameters/Action_PutMetricAlarm'
        - $ref: '#/components/parameters/Version'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PutMetricAlarmInput'
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request - limit exceeded
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /#PutCompositeAlarm:
    post:
      operationId: PutCompositeAlarm
      summary: Create or update a composite alarm
      description: >-
        Creates or updates a composite alarm. When you create a composite alarm,
        you specify a rule expression for the alarm that takes into account the
        alarm states of other alarms that you have created. The composite alarm
        goes into ALARM state only if all conditions of the rule are met.
      tags:
        - Composite Alarms
      parameters:
        - $ref: '#/components/parameters/Action_PutCompositeAlarm'
        - $ref: '#/components/parameters/Version'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PutCompositeAlarmInput'
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request - limit exceeded
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /#DescribeAlarms:
    post:
      operationId: DescribeAlarms
      summary: Retrieve information about specified alarms
      description: >-
        Retrieves the specified alarms. You can filter the results by specifying
        a prefix for the alarm name, the alarm state, or a prefix for any
        action. To use this operation and return information about composite
        alarms, you must be signed on with the
        cloudwatch:DescribeAlarms permission.
      tags:
        - Alarms
      parameters:
        - $ref: '#/components/parameters/Action_DescribeAlarms'
        - $ref: '#/components/parameters/Version'
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DescribeAlarmsInput'
      responses:
        '200':
          description: Successful response
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/DescribeAlarmsOutput'
        '400':
          description: Invalid next token
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /#DescribeAlarmsForMetric:
    post:
      operationId: DescribeAlarmsForMetric
      summary: Retrieve alarms for a specified metric
      description: >-
        Retrieves the alarms for the specified metric. To filter the results,
        specify a statistic, period, or unit. This operation retrieves only
        standard alarms that are based on the specified metric.
      tags:
        - Alarms
      parameters:
        - $ref: '#/components/parameters/Action_DescribeAlarmsForMetric'
        - $ref: '#/components/parameters/Version'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DescribeAlarmsForMetricInput'
      responses:
        '200':
          description: Successful response
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/DescribeAlarmsForMetricOutput'

  /#DescribeAlarmHistory:
    post:
      operationId: DescribeAlarmHistory
      summary: Retrieve the history for a specified alarm
      description: >-
        Retrieves the history for the specified alarm. You can filter the
        results by date range or item type. If an alarm name is not specified,
        the histories for either all metric alarms or all composite alarms are
        returned. CloudWatch retains the history of an alarm even if you delete
        the alarm.
      tags:
        - Alarms
      parameters:
        - $ref: '#/components/parameters/Action_DescribeAlarmHistory'
        - $ref: '#/components/parameters/Version'
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DescribeAlarmHistoryInput'
      responses:
        '200':
          description: Successful response
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/DescribeAlarmHistoryOutput'
        '400':
          description: Invalid next token
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /#DeleteAlarms:
    post:
      operationId: DeleteAlarms
      summary: Delete specified alarms
      description: >-
        Deletes the specified alarms. You can delete up to 100 alarms in one
        operation. In the event of an error, no alarms are deleted. To get
        information about your current alarms, use DescribeAlarms. If a
        specified alarm does not exist, no error is returned.
      tags:
        - Alarms
      parameters:
        - $ref: '#/components/parameters/Action_DeleteAlarms'
        - $ref: '#/components/parameters/Version'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DeleteAlarmsInput'
      responses:
        '200':
          description: Successful response
        '400':
          description: Resource not found
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /#SetAlarmState:
    post:
      operationId: SetAlarmState
      summary: Temporarily set the state of an alarm
      description: >-
        Temporarily sets the state of an alarm for testing purposes. When the
        updated state differs from the previous value, the action configured
        for the appropriate state is invoked. For example, if your alarm is
        configured to send an Amazon SNS message when an alarm is triggered,
        temporarily changing the alarm state to ALARM sends an SNS message.
      tags:
        - Alarms
      parameters:
        - $ref: '#/components/parameters/Action_SetAlarmState'
        - $ref: '#/components/parameters/Version'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SetAlarmStateInput'
      responses:
        '200':
          description: Successful response
        '400':
          description: Invalid format or resource not found
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /#EnableAlarmActions:
    post:
      operationId: EnableAlarmActions
      summary: Enable actions for specified alarms
      description: >-
        Enables the actions for the specified alarms.
      tags:
        - Alarms
      parameters:
        - $ref: '#/components/parameters/Action_EnableAlarmActions'
        - $ref: '#/components/parameters/Version'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EnableAlarmActionsInput'
      responses:
        '200':
          description: Successful response

  /#DisableAlarmActions:
    post:
      operationId: DisableAlarmActions
      summary: Disable actions for specified alarms
      description: >-
        Disables the actions for the specified alarms. When an alarm's actions
        are disabled, the alarm actions do not execute when the alarm state
        changes.
      tags:
        - Alarms
      parameters:
        - $ref: '#/components/parameters/Action_DisableAlarmActions'
        - $ref: '#/components/parameters/Version'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DisableAlarmActionsInput'
      responses:
        '200':
          description: Successful response

  /#PutDashboard:
    post:
      operationId: PutDashboard
      summary: Create or update a CloudWatch dashboard
      description: >-
        Creates a dashboard if it does not already exist, or updates an
        existing dashboard. If you update a dashboard, the entire contents are
        replaced with what you specify here. There is no limit to the number
        of dashboards in your account.
      tags:
        - Dashboards
      parameters:
        - $ref: '#/components/parameters/Action_PutDashboard'
        - $ref: '#/components/parameters/Version'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PutDashboardInput'
      responses:
        '200':
          description: Successful response
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/PutDashboardOutput'
        '400':
          description: Dashboard invalid input error
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal service error
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /#GetDashboard:
    post:
      operationId: GetDashboard
      summary: Retrieve details for a specified dashboard
      description: >-
        Displays the details of the dashboard that you specify. To copy an
        existing dashboard, use GetDashboard, and then use the data returned
        within DashboardBody as the template for the new dashboard when you
        call PutDashboard to create the copy.
      tags:
        - Dashboards
      parameters:
        - $ref: '#/components/parameters/Action_GetDashboard'
        - $ref: '#/components/parameters/Version'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GetDashboardInput'
      responses:
        '200':
          description: Successful response
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/GetDashboardOutput'
        '400':
          description: Dashboard not found
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal service error
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /#ListDashboards:
    post:
      operationId: ListDashboards
      summary: List the dashboards in your account
      description: >-
        Returns a list of the dashboards for your account. If you include
        DashboardNamePrefix, only those dashboards with names starting with
        the prefix are listed. Otherwise, all dashboards in your account are
        listed. ListDashboards returns up to 1000 results on one page.
      tags:
        - Dashboards
      parameters:
        - $ref: '#/components/parameters/Action_ListDashboards'
        - $ref: '#/components/parameters/Version'
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ListDashboardsInput'
      responses:
        '200':
          description: Successful response
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ListDashboardsOutput'
        '400':
          description: Invalid parameter value
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal service error
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /#DeleteDashboards:
    post:
      operationId: DeleteDashboards
      summary: Delete specified dashboards
      description: >-
        Deletes all dashboards that you specify. You can specify up to 100
        dashboards to delete. If there is an error during this call, no
        dashboards are deleted.
      tags:
        - Dashboards
      parameters:
        - $ref: '#/components/parameters/Action_DeleteDashboards'
        - $ref: '#/components/parameters/Version'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DeleteDashboardsInput'
      responses:
        '200':
          description: Successful response
        '400':
          description: Dashboard not found
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal service error
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /#PutAnomalyDetector:
    post:
      operationId: PutAnomalyDetector
      summary: Create an anomaly detection model for a metric
      description: >-
        Creates an anomaly detection model for a CloudWatch metric. You can use
        the model to display a band of expected normal values when the metric
        is graphed. If you have enabled unified cross-account observability,
        and this account is a monitoring account, the metric can be in the
        same account or a source account.
      tags:
        - Anomaly Detection
      parameters:
        - $ref: '#/components/parameters/Action_PutAnomalyDetector'
        - $ref: '#/components/parameters/Version'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PutAnomalyDetectorInput'
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /#DescribeAnomalyDetectors:
    post:
      operationId: DescribeAnomalyDetectors
      summary: List anomaly detection models
      description: >-
        Lists the anomaly detection models that you have created in your
        account. For each model, the response includes configuration
        information for the model. If you filter the response, only the
        models matching the filter are returned.
      tags:
        - Anomaly Detection
      parameters:
        - $ref: '#/components/parameters/Action_DescribeAnomalyDetectors'
        - $ref: '#/components/parameters/Version'
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DescribeAnomalyDetectorsInput'
      responses:
        '200':
          description: Successful response
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/DescribeAnomalyDetectorsOutput'

  /#DeleteAnomalyDetector:
    post:
      operationId: DeleteAnomalyDetector
      summary: Delete an anomaly detection model
      description: >-
        Deletes the specified anomaly detection model from your account. For
        more information about how to delete an anomaly detection model, see
        Deleting an Anomaly Detection Model in the CloudWatch User Guide.
      tags:
        - Anomaly Detection
      parameters:
        - $ref: '#/components/parameters/Action_DeleteAnomalyDetector'
        - $ref: '#/components/parameters/Version'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DeleteAnomalyDetectorInput'
      responses:
        '200':
          description: Successful response
        '400':
          description: Resource not found or missing required fields
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /#PutMetricStream:
    post:
      operationId: PutMetricStream
      summary: Create or update a metric stream
      description: >-
        Creates or updates a metric stream. Metric streams can automatically
        stream CloudWatch metrics to a Amazon Kinesis Data Firehose delivery
        stream, or to Amazon S3 via a Kinesis Data Firehose delivery stream.
        The output includes metric data in one of two formats, JSON or the
        OpenTelemetry 0.7.0 protobuf format.
      tags:
        - Metric Streams
      parameters:
        - $ref: '#/components/parameters/Action_PutMetricStream'
        - $ref: '#/components/parameters/Version'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PutMetricStreamInput'
      responses:
        '200':
          description: Successful response
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/PutMetricStreamOutput'
        '400':
          description: Bad request
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /#ListMetricStreams:
    post:
      operationId: ListMetricStreams
      summary: List the metric streams in your account
      description: >-
        Returns a list of metric streams in this account.
      tags:
        - Metric Streams
      parameters:
        - $ref: '#/components/parameters/Action_ListMetricStreams'
        - $ref: '#/components/parameters/Version'
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ListMetricStreamsInput'
      responses:
        '200':
          description: Successful response
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ListMetricStreamsOutput'

  /#TagResource:
    post:
      operationId: TagResource
      summary: Assign tags to a CloudWatch resource
      description: >-
        Assigns one or more tags (key-value pairs) to the specified CloudWatch
        resource. Currently, the only CloudWatch resources that can be tagged
        are alarms and Contributor Insights rules. Tags can help you organize
        and categorize your resources.
      tags:
        - Metrics
      parameters:
        - $ref: '#/components/parameters/Action_TagResource'
        - $ref: '#/components/parameters/Version'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TagResourceInput'
      responses:
        '200':
          description: Successful response

  /#UntagResource:
    post:
      operationId: UntagResource
      summary: Remove tags from a CloudWatch resource
      description: >-
        Removes one or more tags from the specified resource.
      tags:
        - Metrics
      parameters:
        - $ref: '#/components/parameters/Action_UntagResource'
        - $ref: '#/components/parameters/Version'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UntagResourceInput'
      responses:
        '200':
          description: Successful response

  /#ListTagsForResource:
    post:
      operationId: ListTagsForResource
      summary: List tags for a CloudWatch resource
      description: >-
        Displays the tags associated with a CloudWatch resource. Currently,
        alarms and Contributor Insights rules support tagging.
      tags:
        - Metrics
      parameters:
        - $ref: '#/components/parameters/Action_ListTagsForResource'
        - $ref: '#/components/parameters/Version'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ListTagsForResourceInput'
      responses:
        '200':
          description: Successful response
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/ListTagsForResourceOutput'

components:
  securitySchemes:
    aws_sigv4:
      type: apiKey
      name: Authorization
      in: header
      description: AWS Signature Version 4 authentication
      x-amazon-apigateway-authtype: awsSigv4

  parameters:
    Version:
      name: Version
      in: query
      required: true
      schema:
        type: string
        enum:
          - '2010-08-01'
      description: The API version (2010-08-01)

    ContentType:
      name: Content-Type
      in: header
      schema:
        type: string
        default: application/x-www-form-urlencoded

    Action_PutMetricData:
      name: Action
